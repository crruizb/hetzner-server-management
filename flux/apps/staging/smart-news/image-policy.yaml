apiVersion: image.toolkit.fluxcd.io/v1beta2
kind: ImageRepository
metadata:
  name: smart-news-service
  namespace: apps
spec:
  image: cristianrb/smartnews
  interval: 1m0s
  exclusionList:
    - ^latest$
---
apiVersion: image.toolkit.fluxcd.io/v1beta2
kind: ImagePolicy
metadata:
  name: smart-news-service
  namespace: apps
spec:
  imageRepositoryRef:
    name: smart-news-service
  policy:
    numerical:
      order: desc
