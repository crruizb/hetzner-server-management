apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: prexario-service
  namespace: apps
spec:
  values:
    image:
      repository: cristianrb/prexario
      tag: latest
      pullPolicy: Always
    envSecretName: prexario-secrets
    service:
      port: 8080
    ingress:
      enabled: true
      className: traefik
      annotations:
        cert-manager.io/cluster-issuer: letsencrypt-staging
      hosts:
        - host: api.prexario.dpdns.org
          paths:
            - path: /
              pathType: Prefix
      tls:
        - secretName: prexario-dpdns-org-tls
          hosts:
            - api.prexario.dpdns.org
